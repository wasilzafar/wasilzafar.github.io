name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check encoding (mojibake, BOM, null bytes)
        run: python .tools/check-encoding.py

      - name: Check internal links (all types)
        run: python .tools/seo/check_links.py

      - name: Check sitemap coverage
        run: python .tools/seo/check_sitemap.py

      - name: Check content quality
        run: python .tools/check-content-quality.py

      - name: Check search index freshness
        run: |
          node .tools/search/build-search-index.js
          git diff --exit-code -- search-index.json

      - name: Check feed freshness
        run: |
          node .tools/feeds/build-feeds.js --deterministic
          git diff --exit-code -- feed.xml atom.xml feeds/
