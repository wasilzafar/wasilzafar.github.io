# Pre-commit hooks for wasilzafar.com
# Install: uv tool install pre-commit && pre-commit install
# Skip:    git commit --no-verify
# Run all: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: check-encoding
        name: Check UTF-8 encoding (mojibake, BOM)
        entry: python .github/scripts/check-encoding.py
        language: system
        files: \.html$
        pass_filenames: false

      - id: check-links
        name: Check internal page links
        entry: python .github/scripts/seo/check_links.py --pages-only
        language: system
        files: \.html$
        pass_filenames: false
